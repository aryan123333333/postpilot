services:
  - type: web
    name: postpilot-ai
    runtime: node
    plan: free
    region: oregon
    buildCommand: npx prisma generate && npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        generateValue: true          # Render injects the actual PORT automatically
      - key: HOSTNAME
        value: "0.0.0.0"
      - key: NEXTAUTH_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
